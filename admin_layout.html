<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Layout</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --panel: #78a6d4;
      --gap: 24px;
      --border: 3px solid #0f0f0f;
      --shadow: 0 10px 25px rgba(0,0,0,0.35);
      --text-dark: #111;
      --text-light: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      padding: 28px 16px;
    }

    /* Outer "canvas" similar to the screenshot proportions */
    .wrap {
      width: min(860px, 100%);
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .panel {
      background: var(--panel);
      border: var(--border);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }

    /* Top header */
    .top-panel {
      height: 72px;
      justify-content: flex-start;
      padding-left: 34px;
      color: var(--text-light);
      font-size: 22px;
    }

    /* Middle two panels */
    .middle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
    }

    .middle-panel {
      height: 520px;
      color: var(--text-dark);
      font-size: 22px;
    }

    /* Bottom wide panel */
    .bottom-panel {
      height: 240px;
      color: var(--text-dark);
      font-size: 22px;
    }

    /* Simple responsiveness: stack middle panels on narrow screens */
    @media (max-width: 700px) {
      .middle-row {
        grid-template-columns: 1fr;
      }
      .middle-panel {
        height: 320px;
      }
      .bottom-panel {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="panel top-panel">TOP PANEL</header>

    <section class="middle-row">
      <div class="panel middle-panel">PRODUCT MANAGEMENT</div>
      <div class="panel middle-panel">NEWS MANAGEMENT</div>
    </section>

    <section class="panel bottom-panel">ORDERS MANAGEMENT</section>
  </main>
</body>
</html>
