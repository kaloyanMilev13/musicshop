<script>
    function logout() {
        fetch("/musicshop/api/logout.php", {
            credentials: "include"
        }).then(() => window.location = "index.html");
    }

    document.getElementById("year").textContent = new Date().getFullYear();

    document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const logoutBtn = document.getElementById("logoutBtn");

        // THEME
        function applyTheme(theme) {
            if (theme === "dark") {
                document.body.classList.add("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌙";
            } else {
                document.body.classList.remove("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌞";
            }
        }
        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme === "dark" ? "dark" : "light");

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                const isDark = document.body.classList.toggle("dark-theme");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                if (themeIcon) themeIcon.textContent = isDark ? "🌙" : "🌞";
            });
        }

        // Admin visibility
        fetch("/musicshop/api/admin_check.php", { credentials: "include" })
            .then(r => {
                if (!r.ok) {
                    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
                } else {
                    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");
                }
            })
            .catch(() => {
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
            });

        // Login state
        fetch("/musicshop/api/whoami.php", { credentials: "include" })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                const loggedIn = data && data.logged_in;
                if (loggedIn) {
                    if (logoutBtn) logoutBtn.style.display = "inline-flex";
                    if (loginBtn) loginBtn.style.display = "none";
                    if (footerSecondary) footerSecondary.textContent = "Калоян Милев - Димпломен Проект";
                } else {
                    if (logoutBtn) logoutBtn.style.display = "none";
                    if (loginBtn) loginBtn.style.display = "inline-flex";
                    if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
                }
            })
            .catch(() => {
                if (logoutBtn) logoutBtn.style.display = "none";
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                if (loginBtn) loginBtn.style.display = "inline-flex";
                if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
            });

        // Render cart initially
        renderCart();
    });

    // ----- Cart helpers (same logic as your original) -----
    function getCart() {
        try {
            const raw = localStorage.getItem('musicshop_cart');
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }

    function saveCart(cart) {
        localStorage.setItem('musicshop_cart', JSON.stringify(cart));
    }

    function clearCart() {
        localStorage.removeItem('musicshop_cart');
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById("cart_list");
        const totalEl = document.getElementById("cart_total");

        container.innerHTML = "";

        if (cart.length === 0) {
            container.textContent = "Количката е празна.";
            totalEl.textContent = "";
            return;
        }

        let total = 0;

        cart.forEach((item, index) => {
            const lineTotal = item.price * item.quantity;
            total += lineTotal;

            const div = document.createElement("div");
            div.className = "cart-item";
            div.innerHTML = `
                <strong>${item.name}</strong>
                <div class="cart-controls">
                    <button class="btn-outline view-btn" data-id="${item.id}">Виж продукт</button>
                    <button class="btn-outline dec-btn" data-index="${index}">-</button>
                    <span class="qty">${item.quantity}</span>
                    <button class="btn-outline inc-btn" data-index="${index}">+</button>
                    <span class="line-total">€${lineTotal.toFixed(2)}</span>
                    <button class="btn-outline remove-btn" data-index="${index}">Премахни</button>
                </div>
            `;
            container.appendChild(div);
        });

        totalEl.textContent = "Общо: €" + total.toFixed(2);

        // Increment quantity
        container.querySelectorAll(".inc-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.getAttribute("data-index"), 10);
                changeQuantity(idx, +1);
            });
        });

        // Decrement quantity
        container.querySelectorAll(".dec-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.getAttribute("data-index"), 10);
                changeQuantity(idx, -1);
            });
        });

        container.querySelectorAll(".view-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const pid = btn.getAttribute("data-id");
                if (pid) {
                    window.location = "product.html?id=" + pid;
                }
            });
        });

        // Remove item completely
        container.querySelectorAll(".remove-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.getAttribute("data-index"), 10);
                removeItem(idx);
            });
        });
    }

    function changeQuantity(index, delta) {
        const cart = getCart();
        if (!cart[index]) return;

        cart[index].quantity += delta;

        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }

        saveCart(cart);
        renderCart();
    }

    function removeItem(index) {
        const cart = getCart();
        if (!cart[index]) return;

        cart.splice(index, 1);
        saveCart(cart);
        renderCart();
    }

    // ----- Place order with checkout fields -----
    function placeOrder() {
        const cart = getCart();
        if (cart.length === 0) {
            alert("Количката е празна.");
            return;
        }

        const name     = document.getElementById("chk_name").value.trim();
        const email    = document.getElementById("chk_email").value.trim();
        const phone    = document.getElementById("chk_phone").value.trim();
        const address  = document.getElementById("chk_address").value.trim();
        const city     = document.getElementById("chk_city").value.trim();
        const postcode = document.getElementById("chk_postcode").value.trim();
        const country  = document.getElementById("chk_country").value.trim();
        const note     = document.getElementById("chk_note").value.trim();

        if (!name || !address || !city || !postcode || !country) {
            alert("Моля, попълни всички задължителни полета (отбелязани с *).");
            return;
        }

        const items = cart.map(it => ({
            product_id: it.id,
            quantity: it.quantity
        }));

        fetch('/musicshop/api/create_order.php', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({
                items,
                name,
                email,
                phone,
                address,
                city,
                postcode,
                country,
                note
            })
        })
        .then(r => {
            if (r.status === 401) {
                window.location.href = "login.html";
                return null;
            }
            return r.json();
        })
        .then(data => {
            if (!data) return;
            if (!data.ok) {
                alert("Поръчката е неуспешна: " + (data.error || "Неизвестна грешка"));
                return;
            }

            alert("Поръчката е направена успешно. ID: " + data.order_id);
            clearCart();
            document.getElementById("checkout_form").reset();
            renderCart();
        })
        .catch(err => {
            console.error(err);
            alert("Грешка при създаване на поръчката.");
        });
    }
</script>
