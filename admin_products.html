<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Products - MusicShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-btn-header {
            background: #ffffff;
            color: #222222;
            border: 1px solid #e6e6e6;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .login-btn-header:hover {
            background: #e6e6e6;
            border-color: #d0d0d0;
        }

        body.dark-theme .login-btn-header {
            background: #2a2a2a;
            color: #f5f5f5;
            border-color: #3a3a3a;
        }

        body.dark-theme .login-btn-header:hover {
            background: #333333;
            border-color: #4a4a4a;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            margin-right: 0.6rem;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .brand-icon .brand-logo-dark {
            display: none;
        }

        .nav-links a {
            white-space: nowrap;
        }

        body.dark-theme .brand-icon .brand-logo-light {
            display: none;
        }

        body.dark-theme .brand-icon .brand-logo-dark {
            display: block;
        }
    </style>
</head>
<body class="admin-products-page products-page">

<header class="site-header">
    <div class="nav-inner">
        <a href="index.html" class="brand">
            <div class="brand-icon" aria-hidden="true">
                <img src="images/logo_black.png" alt="" class="brand-logo-light">
                <img src="images/logo_white.png" alt="" class="brand-logo-dark">
            </div>
            <div class="brand-text">
                <h1>MusicShop</h1>
                <p>Instruments · Vinyls · Merch</p>
            </div>
        </a>

        <nav class="nav-links">
            <a href="products.html">Products</a>
            <a href="favorites.html">Favorites</a>
            <a href="cart.html">Cart</a>
            <a href="orders.html">Orders</a>
            <a href="news.html">News</a>
            <a href="admin.html" class="active admin-only" id="adminLink">Admin</a>
        </nav>

        <div class="nav-secondary">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <span id="themeIcon">🌞</span>
            </button>

            <button class="login-btn-header" id="loginBtn" onclick="window.location='login.html'" style="display:none">Log In</button>

            <div class="user-status-pill">
                <div class="user-status-dot"></div>
                <div id="userStatus">Not logged in.</div>
            </div>

            <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">
                <span>⏏</span>
                Logout
            </button>
        </div>
    </div>
</header>

<main>
    <div class="page-wrapper">
        <section class="filter-card">
            <div class="filter-header">
                <h1>Admin products</h1>
                <span>Search and manage products</span>
            </div>

            <div class="filters-grid">
                <div class="filter-group">
                    <label for="adminProductSearch">Search</label>
                    <input id="adminProductSearch" type="text" placeholder="Search by name, artist, category, or subcategory">
                </div>
            </div>

            <div class="filter-actions">
                <button id="adminSearchBtn" class="btn-apply" type="button">Search</button>
                <button id="adminSearchClear" class="btn-outline" type="button">Clear</button>
            </div>
        </section>

        <section class="products-section">
            <div class="products-header">
                <h2>All products</h2>
                <span id="adminProductsCount"></span>
                <a class="btn-outline" href="admin.html">Back to admin</a>
            </div>

            <div id="adminProductsList">Loading...</div>
        </section>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <span>© <span id="year"></span> MusicShop. All rights reserved.</span>
        <span id="footerSecondary">Нямаш профил? <a href="register.html">Създай такъв</a></span>
    </div>
</footer>

<script>
    function logout() {
        fetch("/musicshop/api/logout.php", {
            credentials: "include"
        }).then(() => window.location = "index.html");
    }

    const adminProducts = {
        all: [],
        query: ""
    };

    function goEditProduct(id) {
        window.location = "admin.html?edit=" + id;
    }

    function buildAdminProductCard(p) {
        const card = document.createElement("div");
        card.className = "product-card";

        const image = document.createElement("img");
        image.className = "product-thumb";
        image.src = p.image_url || "images/products/placeholder.jpg";
        image.alt = p.name || "Product image";

        const heading = document.createElement("div");
        heading.className = "product-card-heading";

        const name = document.createElement("div");
        name.className = "product-name";
        name.textContent = p.name || "Unnamed product";

        const price = document.createElement("div");
        price.className = "product-price";
        price.textContent = "€" + Number(p.price).toFixed(2);

        heading.appendChild(name);
        heading.appendChild(price);

        const meta = document.createElement("div");
        meta.className = "product-meta";
        const parts = [];
        if (p.artist) parts.push(p.artist);
        if (p.category) parts.push(p.category);
        if (p.genre) parts.push(p.genre);
        if (p.music_genre) parts.push(p.music_genre);
        meta.textContent = parts.join(" · ") || "-";

        const desc = document.createElement("div");
        desc.className = "product-description";
        desc.textContent = p.description || "No description available.";

        const actions = document.createElement("div");
        actions.className = "product-actions";

        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.className = "btn-secondary";
        editBtn.textContent = "Edit product";
        editBtn.addEventListener("click", () => goEditProduct(p.id));

        actions.appendChild(editBtn);

        card.appendChild(image);
        card.appendChild(heading);
        card.appendChild(meta);
        card.appendChild(desc);
        card.appendChild(actions);

        return card;
    }

    function renderAdminProducts() {
        const list = document.getElementById("adminProductsList");
        const count = document.getElementById("adminProductsCount");
        if (!list) return;

        const q = adminProducts.query.toLowerCase();
        const filtered = adminProducts.all.filter(p => {
            const haystack = [
                p.name,
                p.artist,
                p.category,
                p.genre,
                p.music_genre
            ].filter(Boolean).join(" ").toLowerCase();
            return haystack.includes(q);
        });

        if (count) {
            count.textContent = filtered.length + " product" + (filtered.length !== 1 ? "s" : "");
        }

        list.innerHTML = "";
        if (filtered.length === 0) {
            list.textContent = "No products found.";
            return;
        }

        const grid = document.createElement("div");
        grid.className = "product-grid";
        filtered.forEach(p => grid.appendChild(buildAdminProductCard(p)));
        list.appendChild(grid);
    }

    function loadAdminProducts() {
        fetch("/musicshop/api/products.php", { credentials: "include" })
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById("adminProductsList");
                if (!data.ok) {
                    if (list) list.textContent = "Error loading products.";
                    return;
                }
                adminProducts.all = Array.isArray(data.products) ? data.products : [];
                renderAdminProducts();
            })
            .catch(() => {
                const list = document.getElementById("adminProductsList");
                if (list) list.textContent = "Error loading products.";
            });
    }

    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("year").textContent = new Date().getFullYear();

        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const logoutBtn = document.getElementById("logoutBtn");

        function applyTheme(theme) {
            if (theme === "dark") {
                document.body.classList.add("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌙";
            } else {
                document.body.classList.remove("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌞";
            }
        }
        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme === "dark" ? "dark" : "light");

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                const isDark = document.body.classList.toggle("dark-theme");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                if (themeIcon) themeIcon.textContent = isDark ? "🌙" : "🌞";
            });
        }

        fetch("/musicshop/api/admin_check.php", { credentials: "include" })
            .then(r => {
                if (!r.ok) {
                    window.location = "index.html";
                    return;
                }
            })
            .catch(() => {
                window.location = "index.html";
            });

        fetch("/musicshop/api/whoami.php", { credentials: "include" })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                const loggedIn = data && data.logged_in;
                if (loggedIn) {
                    if (logoutBtn) logoutBtn.style.display = "inline-flex";
                    if (loginBtn) loginBtn.style.display = "none";
                    if (footerSecondary) footerSecondary.textContent = "Калоян Милев - Димпломен Проект";
                } else {
                    if (logoutBtn) logoutBtn.style.display = "none";
                    if (loginBtn) loginBtn.style.display = "inline-flex";
                    if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
                }
            })
            .catch(() => {
                if (logoutBtn) logoutBtn.style.display = "none";
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                if (loginBtn) loginBtn.style.display = "inline-flex";
                if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
            });

        const searchInput = document.getElementById("adminProductSearch");
        const searchBtn = document.getElementById("adminSearchBtn");
        const clearBtn = document.getElementById("adminSearchClear");
        const applySearch = () => {
            adminProducts.query = (searchInput?.value || "").trim();
            renderAdminProducts();
        };
        if (searchInput) {
            searchInput.addEventListener("input", applySearch);
            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    applySearch();
                }
            });
        }
        if (searchBtn) {
            searchBtn.addEventListener("click", applySearch);
        }
        if (clearBtn && searchInput) {
            clearBtn.addEventListener("click", () => {
                searchInput.value = "";
                adminProducts.query = "";
                renderAdminProducts();
            });
        }

        loadAdminProducts();
    });
</script>

<script src="js/script.js?v=20260309"></script>
</body>
</html>
