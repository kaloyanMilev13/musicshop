<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Продукт - MusicShop</title>
    <link rel="stylesheet" href="css/style.css?v=20260323b">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Ensure readable price and meta in dark theme */
        body.dark-theme .product-price-large {
            color: #ffffff !important;
        }
        body.dark-theme .product-detail-body .card-header span,
        body.dark-theme .product-detail-description,
        body.dark-theme .product-meta-row span {
            color: #e6e6e6 !important;
        }

        .related-products-shell {
            width: 100%;
            max-width: 1200px;
            justify-self: center;
        }

        .product-detail-page .product-carousel .carousel-item {
            cursor: pointer;
        }

        .product-detail-page .product-carousel .carousel-item img {
            object-fit: contain;
            object-position: center;
            display: block;
            padding: 0.75rem;
            background: #f0f0f0;
        }

        .login-btn-header {
            background: #ffffff;
            color: #222222;
            border: 1px solid #e6e6e6;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .login-btn-header:hover {
            background: #e6e6e6;
            border-color: #d0d0d0;
        }

        body.dark-theme .login-btn-header {
            background: #2a2a2a;
            color: #f5f5f5;
            border-color: #3a3a3a;
        }

        body.dark-theme .login-btn-header:hover {
            background: #333333;
            border-color: #4a4a4a;
        }

        .nav-inner {
            gap: 1rem;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            margin-right: 0.6rem;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .brand-icon .brand-logo-dark {
            display: none;
        }

        .nav-links {
            gap: 1rem;
        }

        .nav-links a {
            white-space: nowrap;
        }

        body.dark-theme .brand-icon .brand-logo-light {
            display: none;
        }

        body.dark-theme .brand-icon .brand-logo-dark {
            display: block;
        }
    </style>
</head>
<body class="product-detail-page">

<header class="site-header">
    <div class="nav-inner">
        <a href="index.html" class="brand">
            <div class="brand-icon" aria-hidden="true">
                <img src="images/logo_black.png" alt="" class="brand-logo-light">
                <img src="images/logo_white.png" alt="" class="brand-logo-dark">
            </div>
            <div class="brand-text">
                <h1>MusicShop</h1>
                <p>Инструменти · Плочи · Мърч</p>
            </div>
        </a>

        <nav class="nav-links">
            <a href="products.html" class="active">Продукти</a>
            <a href="favorites.html">Любими</a>
            <a href="cart.html">Количка</a>
            <a href="orders.html">Поръчки</a>
            <a href="news.html">Новини</a>
            <a href="admin.html" id="adminLink" class="admin-only">Админ</a>
        </nav>

        <div class="nav-secondary">
            <button class="theme-toggle" id="themeToggle" aria-label="Смени темата">
                <span id="themeIcon">🌞</span>
            </button>

            <button class="login-btn-header" id="loginBtn" onclick="window.location='login.html'" style="display:none">Вход</button>

            <div class="user-status-pill">
                <div class="user-status-dot"></div>
                <div id="userStatus">Не сте влезли.</div>
            </div>

            <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">
                <span>⏏</span>
                Изход
            </button>
        </div>
    </div>
</header>

<main>
    <div class="page-wrapper product-detail-wrapper">
        <section class="card product-detail-card" id="productSection">
            <div class="product-detail-grid">
                <div class="product-detail-media">
                    <div class="product-detail-image-frame">
                        <img id="productImage" class="product-detail-img" src="images/products/placeholder.jpg" alt="">
                    </div>
                </div>
                <div class="product-detail-body">
                    <div class="card-header">
                        <h1 id="productTitle">Зареждане...</h1>
                        <span id="productMeta"></span>
                    </div>

                    <div class="product-price-large" id="productPriceLabel"></div>

                    <p id="productDescription" class="product-detail-description"></p>

                    <div class="product-meta-row" id="productMetaRow"></div>

                    <div class="product-actions" style="margin-top:1rem;">
                        <button class="btn-secondary" id="productFavBtn">Добави в любими</button>
                        <button class="btn-primary" id="productCartBtn">Добави в количката</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="carousel-section product-carousel related-products-shell" id="relatedProductsSection">
            <div class="carousel-header">
                <h2>Още продукти</h2>
                <a href="products.html">Виж всички →</a>
            </div>
            <div class="carousel-container">
                <button class="carousel-btn prev" id="relatedPrevBtn" type="button" onclick="moveRelatedCarousel(-1)">‹</button>
                <div class="carousel-track" id="relatedTrack">
                    <div class="home-empty" style="padding:1.5rem;">Зареждане на предложения...</div>
                </div>
                <button class="carousel-btn next" id="relatedNextBtn" type="button" onclick="moveRelatedCarousel(1)">›</button>
            </div>
        </section>

    </div>
</main>

<footer>
    <div class="footer-inner">
        <span>© <span id="year"></span> MusicShop. Всички права запазени.</span>
        <span id="footerSecondary">Нямаш профил? <a href="register.html">Създай такъв</a></span>
    </div>
</footer>

<script>
    const CATEGORY_LABELS = {
        Instruments: "Инструменти",
        Music: "Музика",
        Merch: "Мърч",
        Other: "Други"
    };
    const SUBCATEGORY_LABELS = {
        Guitars: "Китари",
        Basses: "Басове",
        Drums: "Барабани",
        Keyboards: "Клавишни",
        Studio: "Студио",
        DJ: "DJ",
        Amps: "Усилватели",
        Effects: "Ефекти",
        Microphones: "Микрофони",
        Accessories: "Аксесоари",
        Vinyl: "Плочи",
        CD: "CD",
        Digital: "Дигитални",
        Cassette: "Касети",
        Boxset: "Бокс сет",
        Clothing: "Облекло",
        Headwear: "Шапки",
        Drinkware: "Съдове за напитки",
        Posters: "Постери",
        Stickers: "Стикери",
        Cables: "Кабели",
        Stands: "Стойки",
        Cases: "Калъфи",
        Maintenance: "Поддръжка",
        Gift: "Подаръци",
        Audio: "Аудио",
        Recording: "Запис",
        Other: "Други"
    };
    const MUSIC_GENRE_LABELS = {
        Rock: "Рок",
        Metal: "Метъл",
        Pop: "Поп",
        "Hip-Hop": "Хип-хоп",
        Rap: "Рап",
        Jazz: "Джаз",
        Blues: "Блус",
        Electronic: "Електронна",
        House: "Хаус",
        Techno: "Техно",
        "Drum & Bass": "Дръм енд бейс",
        Classical: "Класическа",
        Soundtrack: "Саундтрак",
        Folk: "Фолклор",
        Other: "Други"
    };
    const ATTRIBUTE_VALUE_LABELS = {
        Black: "Черен",
        White: "Бял",
        Red: "Червен",
        Silver: "Сребрист",
        Cherry: "Черешов",
        Electric: "Електрически",
        "Electric Guitar": "Електрическа китара",
        Piano: "Пиано",
        "Drum Set": "Комплект барабани",
        "Guitar Pedal": "Китарен педал",
        Stand: "Стойка",
        "Pop Filter": "Поп филтър",
        Headphones: "Слушалки",
        Interface: "Аудио интерфейс",
        Vinyl: "Плоча",
        Digital: "Дигитален",
        Cassette: "Касета",
        Boxset: "Бокс сет"
    };

    function translateCategory(value) {
        return CATEGORY_LABELS[value] || value;
    }

    function translateSubcategory(value) {
        return SUBCATEGORY_LABELS[value] || value;
    }

    function translateMusicGenre(value) {
        return MUSIC_GENRE_LABELS[value] || value;
    }

    function translateAttributeValue(value) {
        return ATTRIBUTE_VALUE_LABELS[value] || value;
    }

    const relatedCarousel = {
        track: null,
        index: 0,
        total: 0
    };

    function logout() {
        fetch("/musicshop/api/logout.php", {
            credentials: "include"
        }).then(() => window.location = "index.html");
    }

    function getQueryParam(key) {
        const params = new URLSearchParams(window.location.search);
        return params.get(key);
    }

    function renderProduct(p) {
        const titleEl = document.getElementById("productTitle");
        const metaEl = document.getElementById("productMeta");
        const descEl = document.getElementById("productDescription");
        const imgEl = document.getElementById("productImage");
        const metaRow = document.getElementById("productMetaRow");

        if (titleEl) titleEl.textContent = p.name || "Продукт";

        const metaParts = [];
        if (p.artist) metaParts.push(p.artist);
        if (p.category) metaParts.push(translateCategory(p.category));
        if (p.genre) metaParts.push(translateSubcategory(p.genre));
        if (p.music_genre) metaParts.push(translateMusicGenre(p.music_genre));
        if (metaEl) metaEl.textContent = metaParts.join(" · ");

        if (descEl) descEl.textContent = p.description || "Няма налично описание.";

        const imageUrl = p.image_url || "images/products/placeholder.jpg";
        if (imgEl) {
            imgEl.src = imageUrl;
            imgEl.alt = p.name || "Изображение на продукт";
        }

        const priceLabel = document.getElementById("productPriceLabel");
        if (priceLabel) priceLabel.textContent = "€" + Number(p.price).toFixed(2);

        if (metaRow) {
            metaRow.innerHTML = "";
            const attrs = [];
            if (p.category) attrs.push("Категория: " + translateCategory(p.category));
            if (p.genre) attrs.push("Подкатегория: " + translateSubcategory(p.genre));
            if (p.music_genre) attrs.push("Музикален жанр: " + translateMusicGenre(p.music_genre));
            if (p.format) attrs.push("Формат: " + translateAttributeValue(p.format));
            if (p.color) attrs.push("Цвят: " + translateAttributeValue(p.color));
            if (p.size) attrs.push("Размер: " + p.size);
            if (p.merch_type) attrs.push("Тип мърч: " + translateAttributeValue(p.merch_type));
            if (p.instrument_subtype) attrs.push("Тип инструмент: " + translateAttributeValue(p.instrument_subtype));
            if (p.accessory_type) attrs.push("Тип аксесоар: " + translateAttributeValue(p.accessory_type));
            if (p.stock !== undefined) attrs.push("Наличност: " + p.stock);

            attrs.forEach(text => {
                const span = document.createElement("span");
                span.textContent = text;
                metaRow.appendChild(span);
            });
        }

        const favBtn = document.getElementById("productFavBtn");
        const cartBtn = document.getElementById("productCartBtn");

        if (favBtn) {
            let isFavorite = Number(p.is_favorite) === 1;
            const setFavLabel = () => {
                favBtn.textContent = isFavorite ? "Премахни от любими" : "Добави в любими";
            };
            setFavLabel();

            // Double-check with current favorites list so the label is accurate even if cache is stale
            fetch("/musicshop/api/get_favorites.php", { credentials: "include" })
                .then(r => r.ok ? r.json() : null)
                .then(data => {
                    if (data && data.ok && Array.isArray(data.favorites)) {
                        const exists = data.favorites.some(f => Number(f.id) === Number(p.id));
                        if (exists !== isFavorite) {
                            isFavorite = exists;
                            setFavLabel();
                        }
                    }
                })
                .catch(() => {});

            favBtn.onclick = () => {
                const action = isFavorite ? removeFavorite : addFavorite;
                action(p.id).then(ok => {
                    if (ok) {
                        isFavorite = !isFavorite;
                        setFavLabel();
                    }
                });
            };
        }
        if (cartBtn) {
            const safeName = (p.name || "").replace(/"/g, '&quot;').replace(/'/g, "\\'");
            cartBtn.onclick = () => addToCart(p.id, safeName, p.price);
        }
    }

    function renderRelatedCarouselItem(p) {
        const safeName = (p.name || "").replace(/"/g, '&quot;').replace(/'/g, "\\'");
        const imageUrl = p.image_url || "images/products/placeholder.jpg";
        const item = document.createElement("div");
        item.className = "carousel-item";
        item.setAttribute("role", "link");
        item.setAttribute("tabindex", "0");

        const openProduct = () => {
            window.location.href = `product.html?id=${p.id}`;
        };

        item.addEventListener("click", openProduct);
        item.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openProduct();
            }
        });

        const metaParts = [];
        if (p.artist) metaParts.push(p.artist);
        if (p.category) metaParts.push(translateCategory(p.category));
        if (p.genre) metaParts.push(translateSubcategory(p.genre));
        if (p.music_genre) metaParts.push(translateMusicGenre(p.music_genre));

        item.innerHTML = `
            <img src="${imageUrl}" alt="${safeName}">
            <div class="carousel-item-body">
                <div class="carousel-item-title">${p.name || "Продукт без име"}</div>
                <div class="carousel-item-price">€${Number(p.price).toFixed(2)}</div>
                <div class="carousel-item-meta">${metaParts.join(" · ") || "-"}</div>
                <div class="carousel-item-actions">
                    <button class="primary" type="button">Добави в количката</button>
                    <button class="secondary" type="button">Любими</button>
                </div>
            </div>
        `;

        const cartBtn = item.querySelector(".primary");
        const favBtn = item.querySelector(".secondary");

        if (cartBtn) {
            cartBtn.addEventListener("click", event => {
                event.stopPropagation();
                addToCart(p.id, safeName, p.price);
            });
        }

        if (favBtn) {
            favBtn.addEventListener("click", event => {
                event.stopPropagation();
                addFavorite(p.id);
            });
        }

        return item;
    }

    function setRelatedCarouselMessage(message) {
        const track = document.getElementById("relatedTrack");
        if (!track) return;

        track.innerHTML = `<div class="home-empty" style="padding:1.5rem;">${message}</div>`;
        track.style.transform = "translateX(0)";
        relatedCarousel.track = null;
        relatedCarousel.index = 0;
        relatedCarousel.total = 0;
        updateRelatedCarouselButtons();
    }

    function getRelatedCarouselStep() {
        if (!relatedCarousel.track) return 304;

        const item = relatedCarousel.track.querySelector(".carousel-item");
        const itemWidth = item ? item.getBoundingClientRect().width : 280;
        const styles = getComputedStyle(relatedCarousel.track);
        const gap = parseFloat(styles.columnGap || styles.gap || 24) || 24;
        return itemWidth + gap;
    }

    function getRelatedItemsPerView(step) {
        if (!relatedCarousel.track) return 1;
        const containerWidth = relatedCarousel.track.parentElement.clientWidth;
        return Math.max(1, Math.floor(containerWidth / step));
    }

    function updateRelatedCarouselButtons() {
        const prev = document.getElementById("relatedPrevBtn");
        const next = document.getElementById("relatedNextBtn");

        if (!relatedCarousel.track || relatedCarousel.total === 0) {
            if (prev) prev.disabled = true;
            if (next) next.disabled = true;
            return;
        }

        const step = getRelatedCarouselStep();
        const perView = getRelatedItemsPerView(step);
        const maxIndex = Math.max(0, relatedCarousel.total - perView);

        relatedCarousel.index = Math.min(relatedCarousel.index, maxIndex);
        relatedCarousel.track.style.transform = `translateX(-${relatedCarousel.index * step}px)`;

        if (prev) prev.disabled = relatedCarousel.index === 0;
        if (next) next.disabled = relatedCarousel.index >= maxIndex;
    }

    function moveRelatedCarousel(direction) {
        if (!relatedCarousel.track) return;

        const step = getRelatedCarouselStep();
        const perView = getRelatedItemsPerView(step);
        const maxIndex = Math.max(0, relatedCarousel.total - perView);

        relatedCarousel.index = Math.max(0, Math.min(relatedCarousel.index + direction, maxIndex));
        relatedCarousel.track.style.transform = `translateX(-${relatedCarousel.index * step}px)`;
        updateRelatedCarouselButtons();
    }

    function shuffleProducts(products) {
        const copy = [...products];
        for (let i = copy.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function loadRelatedProducts(currentProductId) {
        fetch("/musicshop/api/products.php", { credentials: "include" })
            .then(r => r.json())
            .then(data => {
                if (!data.ok || !Array.isArray(data.products)) {
                    setRelatedCarouselMessage("Грешка при зареждане на предложенията.");
                    return;
                }

                const products = data.products.filter(p => Number(p.id) !== Number(currentProductId));
                if (products.length === 0) {
                    setRelatedCarouselMessage("Няма други налични продукти.");
                    return;
                }

                const selection = shuffleProducts(products).slice(0, 8);
                const track = document.getElementById("relatedTrack");
                if (!track) return;

                track.innerHTML = "";
                selection.forEach(product => track.appendChild(renderRelatedCarouselItem(product)));

                relatedCarousel.track = track;
                relatedCarousel.index = 0;
                relatedCarousel.total = selection.length;
                updateRelatedCarouselButtons();
            })
            .catch(() => {
                setRelatedCarouselMessage("Грешка при зареждане на предложенията.");
            });
    }

    function loadProduct() {
        const id = getQueryParam("id");
        if (!id) {
            document.getElementById("productTitle").textContent = "Няма избран продукт.";
            setRelatedCarouselMessage("Няма избран продукт.");
            return;
        }

        fetch("/musicshop/api/products.php?id=" + encodeURIComponent(id), { credentials: "include" })
            .then(r => r.json())
            .then(data => {
                if (!data.ok || !data.products || data.products.length === 0) {
                    document.getElementById("productTitle").textContent = "Продуктът не е намерен.";
                    setRelatedCarouselMessage("Няма налични предложения.");
                    return;
                }
                renderProduct(data.products[0]);
                loadRelatedProducts(id);
            })
            .catch(() => {
                document.getElementById("productTitle").textContent = "Грешка при зареждане на продукта.";
                setRelatedCarouselMessage("Грешка при зареждане на предложенията.");
            });
    }

    // Basic cart helpers
    function getCart() {
        try {
            const raw = localStorage.getItem('musicshop_cart');
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }
    function saveCart(cart) {
        localStorage.setItem('musicshop_cart', JSON.stringify(cart));
    }
    function addToCart(id, name, price) {
        const cart = getCart();
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id, name, price: Number(price), quantity: 1 });
        }
        saveCart(cart);
        alert("Добавено в количката.");
    }

    function addFavorite(productId) {
        return fetch('/musicshop/api/add_favorite.php', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ product_id: productId })
        })
        .then(r => r.json())
        .then(data => {
            if (!data.ok) {
                alert("Неуспешно: " + (data.error || "Неизвестна грешка"));
                return false;
            }
            alert("Добавено в любими");
            return true;
        })
        .catch(() => {
            alert("Грешка при добавяне в любими.");
            return false;
        });
    }

    function removeFavorite(productId) {
        return fetch('/musicshop/api/remove_favorite.php', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ product_id: productId })
        })
        .then(r => r.json())
        .then(data => {
            if (!data.ok) {
                alert("Неуспешно: " + (data.error || "Неизвестна грешка"));
                return false;
            }
            alert("Премахнато от любими");
            return true;
        })
        .catch(() => {
            alert("Грешка при премахване от любими.");
            return false;
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const logoutBtn = document.getElementById("logoutBtn");
        const loginBtn = document.getElementById("loginBtn");
        const footerSecondary = document.getElementById("footerSecondary");

        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark-theme");
            if (themeIcon) themeIcon.textContent = "🌜";
        }

        if (themeToggle) {
            themeToggle.addEventListener("click", function () {
                document.body.classList.toggle("dark-theme");
                const isDark = document.body.classList.contains("dark-theme");
                if (themeIcon) themeIcon.textContent = isDark ? "🌜" : "🌞";
                localStorage.setItem("theme", isDark ? "dark" : "light");
            });
        }

        fetch("/musicshop/api/whoami.php", { credentials: "include" })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const loggedIn = data && data.logged_in;
                if (loggedIn) {
                    if (logoutBtn) logoutBtn.style.display = "inline-flex";
                    if (loginBtn) loginBtn.style.display = "none";
                    if (footerSecondary) footerSecondary.textContent = "Калоян Милев - Димпломен Проект";
                } else {
                    if (logoutBtn) logoutBtn.style.display = "none";
                    if (loginBtn) loginBtn.style.display = "inline-flex";
                    if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
                }
            })
            .catch(() => {
                if (logoutBtn) logoutBtn.style.display = "none";
                if (loginBtn) loginBtn.style.display = "inline-flex";
                if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
            });

        document.getElementById("year").textContent = new Date().getFullYear();
        loadProduct();
    });

    window.addEventListener("resize", updateRelatedCarouselButtons);
</script>

<script src="js/script.js?v=20260309"></script>
</body>
</html>
