<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Любими - MusicShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-btn-header {
            background: #ffffff;
            color: #222222;
            border: 1px solid #e6e6e6;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .login-btn-header:hover {
            background: #e6e6e6;
            border-color: #d0d0d0;
        }

        body.dark-theme .login-btn-header {
            background: #2a2a2a;
            color: #f5f5f5;
            border-color: #3a3a3a;
        }

        body.dark-theme .login-btn-header:hover {
            background: #333333;
            border-color: #4a4a4a;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            margin-right: 0.6rem;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .brand-icon .brand-logo-dark {
            display: none;
        }

        .nav-links a {
            white-space: nowrap;
        }

        body.dark-theme .brand-icon .brand-logo-light {
            display: none;
        }

        body.dark-theme .brand-icon .brand-logo-dark {
            display: block;
        }
    </style>


</head>
<body class="favorites-page">

<header class="site-header">
    <div class="nav-inner">
        <a href="index.html" class="brand">
            <div class="brand-icon" aria-hidden="true">
                <img src="images/logo_black.png" alt="" class="brand-logo-light">
                <img src="images/logo_white.png" alt="" class="brand-logo-dark">
            </div>
            <div class="brand-text">
                <h1>MusicShop</h1>
                <p>Инструменти · Плочи · Мърч</p>
            </div>
        </a>

        <nav class="nav-links">
            <a href="products.html">Продукти</a>
            <a href="favorites.html" class="active">Любими</a>
            <a href="cart.html">Количка</a>
            <a href="orders.html">Поръчки</a>
            <a href="news.html">Новини</a>
            <a href="admin.html" id="adminLink" class="admin-only">Админ</a>
        </nav>

        <div class="nav-secondary">
            <button class="theme-toggle" id="themeToggle" aria-label="Смени темата">
                <span id="themeIcon">🌞</span>
            </button>

            <button class="login-btn-header" id="loginBtn" onclick="window.location='login.html'" style="display:none">Вход</button>

            <div class="user-status-pill">
                <div class="user-status-dot"></div>
                <div id="userStatus">Не сте влезли.</div>
            </div>

            <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">
                <span>⏏</span>
                Изход
            </button>
        </div>
    </div>
</header>

<main>
    <div class="page-wrapper">
        <section class="favorites-section">
            <div class="favorites-header">
                <h2>Твоите любими</h2>
                <span id="favoritesCountLabel"></span>
            </div>

            <div id="favorites_list">Зареждане...</div>
        </section>
    </div>
</main>

<!-- PRODUCT DETAIL MODAL (same blueprint style as products) -->
<div id="productModal" class="product-modal">
    <div class="product-modal-backdrop"></div>
    <div class="product-modal-dialog">
        <div class="modal-header">
            <div>
                <h3 class="modal-title" id="modalTitle"></h3>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
            <button type="button" class="modal-close" id="modalCloseBtn">&times;</button>
        </div>

        <div class="modal-body">
            <div class="modal-meta-row" id="modalMetaRow"></div>
            <p class="modal-description" id="modalDescription"></p>
        </div>

        <div class="modal-actions">
            <button class="secondary" id="modalRemoveBtn">Премахни от любими</button>
            <button class="primary" id="modalCartBtn">Добави в количката</button>
        </div>
    </div>
</div>

<footer>
    <div class="footer-inner">
        <span>© <span id="year"></span> MusicShop. Всички права запазени.</span>
        <span id="footerSecondary">Нямаш профил? <a href="register.html">Създай такъв</a></span>
    </div>
</footer>

<script>
    const CATEGORY_LABELS = {
        Instruments: "Инструменти",
        Music: "Музика",
        Merch: "Мърч",
        Other: "Други"
    };
    const SUBCATEGORY_LABELS = {
        Guitars: "Китари",
        Basses: "Басове",
        Drums: "Барабани",
        Keyboards: "Клавишни",
        Studio: "Студио",
        DJ: "DJ",
        Amps: "Усилватели",
        Effects: "Ефекти",
        Microphones: "Микрофони",
        Accessories: "Аксесоари",
        Vinyl: "Плочи",
        CD: "CD",
        Digital: "Дигитални",
        Cassette: "Касети",
        Boxset: "Бокс сет",
        Clothing: "Облекло",
        Headwear: "Шапки",
        Drinkware: "Съдове за напитки",
        Posters: "Постери",
        Stickers: "Стикери",
        Cables: "Кабели",
        Stands: "Стойки",
        Cases: "Калъфи",
        Maintenance: "Поддръжка",
        Gift: "Подаръци",
        Audio: "Аудио",
        Recording: "Запис",
        Other: "Други"
    };
    const MUSIC_GENRE_LABELS = {
        Rock: "Рок",
        Metal: "Метъл",
        Pop: "Поп",
        "Hip-Hop": "Хип-хоп",
        Rap: "Рап",
        Jazz: "Джаз",
        Blues: "Блус",
        Electronic: "Електронна",
        House: "Хаус",
        Techno: "Техно",
        "Drum & Bass": "Дръм енд бейс",
        Classical: "Класическа",
        Soundtrack: "Саундтрак",
        Folk: "Фолклор",
        Other: "Други"
    };

    function translateCategory(value) {
        return CATEGORY_LABELS[value] || value || "-";
    }

    function translateSubcategory(value) {
        return SUBCATEGORY_LABELS[value] || value;
    }

    function translateMusicGenre(value) {
        return MUSIC_GENRE_LABELS[value] || value;
    }

    function logout() {
        fetch("/musicshop/api/logout.php", {
            credentials: "include"
        }).then(() => window.location = "index.html");
    }

    document.getElementById("year").textContent = new Date().getFullYear();

    let currentModalProduct = null;

    document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const logoutBtn = document.getElementById("logoutBtn");

        // THEME (same logic as index/products)
        function applyTheme(theme) {
            if (theme === "dark") {
                document.body.classList.add("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌙";
            } else {
                document.body.classList.remove("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌞";
            }
        }
        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme === "dark" ? "dark" : "light");

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                const isDark = document.body.classList.toggle("dark-theme");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                if (themeIcon) themeIcon.textContent = isDark ? "🌙" : "🌞";
            });
        }

        // ADMIN visibility via admin_check.php
        fetch("/musicshop/api/admin_check.php", { credentials: "include" })
            .then(r => {
                if (!r.ok) {
                    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
                } else {
                    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");
                }
            })
            .catch(() => {
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
            });

        // LOGIN state via whoami.php
        fetch("/musicshop/api/whoami.php", { credentials: "include" })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                const loggedIn = data && data.logged_in;
                if (loggedIn) {
                    if (logoutBtn) logoutBtn.style.display = "inline-flex";
                    if (loginBtn) loginBtn.style.display = "none";
                    if (footerSecondary) footerSecondary.textContent = "Калоян Милев - Димпломен Проект";
                } else {
                    if (logoutBtn) logoutBtn.style.display = "none";
                    if (loginBtn) loginBtn.style.display = "inline-flex";
                    if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
                }
            })
            .catch(() => {
                if (logoutBtn) logoutBtn.style.display = "none";
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                if (loginBtn) loginBtn.style.display = "inline-flex";
                if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
            });

        // Modal wiring
        const modal = document.getElementById("productModal");
        const backdrop = document.querySelector(".product-modal-backdrop");
        const closeBtn = document.getElementById("modalCloseBtn");
        const removeBtn = document.getElementById("modalRemoveBtn");
        const cartBtn = document.getElementById("modalCartBtn");

        function closeProductModal() {
            if (!modal) return;
            modal.classList.remove("show");
            currentModalProduct = null;
        }

        if (backdrop) backdrop.addEventListener("click", closeProductModal);
        if (closeBtn) closeBtn.addEventListener("click", closeProductModal);

        if (removeBtn) {
            removeBtn.addEventListener("click", () => {
                if (currentModalProduct) {
                    removeFavorite(currentModalProduct.id);
                    closeProductModal();
                }
            });
        }

        if (cartBtn) {
            cartBtn.addEventListener("click", () => {
                if (currentModalProduct) {
                    const safeName = (currentModalProduct.name || "").replace(/"/g, '&quot;').replace(/'/g, "\\'");
                    addToCart(currentModalProduct.id, safeName, currentModalProduct.price);
                    closeProductModal();
                }
            });
        }

        // Load favorites after everything is wired
        loadFavorites();
    });

    // --- CART HELPERS (same as products/orders) ---
    function getCart() {
        try {
            const raw = localStorage.getItem('musicshop_cart');
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }

    function saveCart(cart) {
        localStorage.setItem('musicshop_cart', JSON.stringify(cart));
    }

    function addToCart(id, name, price) {
        const cart = getCart();
        const existing = cart.find(item => item.id === id);

        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({
                id: id,
                name: name,
                price: Number(price),
                quantity: 1
            });
        }

        saveCart(cart);
        alert("Добавено в количката.");
    }

    function removeFavorite(productId) {
        fetch('/musicshop/api/remove_favorite.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ product_id: productId })
        })
        .then(r => r.json())
        .then(data => {
            if (!data.ok) {
                alert('Неуспешно премахване от любими: ' + (data.error || 'Неизвестна грешка'));
                return;
            }
            loadFavorites();
        })
        .catch(() => alert('Грешка при премахване от любими.'));
    }

    // --- MODAL OPEN ---
    function openProductModal(p) {
        currentModalProduct = p;

        const modal = document.getElementById("productModal");
        if (!modal) return;

        const titleEl = document.getElementById("modalTitle");
        const subtitleEl = document.getElementById("modalSubtitle");
        const metaRow = document.getElementById("modalMetaRow");
        const descEl = document.getElementById("modalDescription");

        if (titleEl) titleEl.textContent = p.name || "Детайли за продукта";

        const subtitleParts = [];
        if (p.artist) subtitleParts.push(p.artist);
        if (p.category) subtitleParts.push(p.category);
        if (p.genre) subtitleParts.push(p.genre);
        if (p.music_genre) subtitleParts.push(p.music_genre);
        if (subtitleEl) subtitleEl.textContent = subtitleParts.join(" · ");

        if (metaRow) {
            metaRow.innerHTML = "";
            const priceSpan = document.createElement("span");
            priceSpan.textContent = "Цена: €" + p.price;
            metaRow.appendChild(priceSpan);

            if (p.category) {
                const c = document.createElement("span");
                c.textContent = "Основна: " + p.category;
                metaRow.appendChild(c);
            }
            if (p.genre) {
                const g = document.createElement("span");
                g.textContent = "Подкатегория: " + p.genre;
                metaRow.appendChild(g);
            }
            if (p.music_genre) {
                const mg = document.createElement("span");
                mg.textContent = "Музикален жанр: " + p.music_genre;
                metaRow.appendChild(mg);
            }
        }

        if (descEl) {
            descEl.textContent = p.description || "Няма налично описание за този продукт.";
        }

        modal.classList.add("show");
    }

    // --- LOAD FAVORITES ---
    function loadFavorites() {
        fetch('/musicshop/api/get_favorites.php', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById("favorites_list");
                const countLabel = document.getElementById("favoritesCountLabel");
                container.innerHTML = "";

                if (!data.ok) {
                    if (data.error === 'Not logged in') {
                        container.innerHTML = '<div class="empty-box">За да видиш любимите си, влез или се регистрирай.</div>';
                    } else {
                        container.innerHTML = '<div class="empty-box">Грешка при зареждане на любимите.</div>';
                    }
                    if (countLabel) countLabel.textContent = "";
                    return;
                }

                if (!data.favorites || data.favorites.length === 0) {
                    container.innerHTML = '<div class="empty-box">Все още нямаш любими.</div>';
                    if (countLabel) countLabel.textContent = "0 елемента";
                    return;
                }

                if (countLabel) {
                    countLabel.textContent = data.favorites.length + " " + (data.favorites.length === 1 ? "елемент" : "елемента");
                }

                const grid = document.createElement("div");
                grid.className = "product-grid";

                data.favorites.forEach(p => {
                    const card = document.createElement("div");
                    card.className = "product-card";

                    const safeName = (p.name || '').replace(/"/g, '&quot;').replace(/'/g, "\\'");

                    const imageUrl = p.image_url || "images/products/placeholder.jpg";

                    card.innerHTML = `
                        <div class="product-thumb-frame">
                            <img class="product-thumb" src="${imageUrl}" alt="${safeName}">
                        </div>
                        <div class="product-card-heading">
                            <div class="product-name">${p.name || "Продукт без име"}</div>
                            <div class="product-price">€${p.price}</div>
                        </div>
                        <div class="product-meta">
                            ${p.artist ? p.artist + " · " : ""}
                            ${translateCategory(p.category)}${p.genre ? " · " + translateSubcategory(p.genre) : ""}
                            ${p.music_genre ? " · " + translateMusicGenre(p.music_genre) : ""}
                        </div>
                        <div class="product-description">
                            ${p.description || "Няма налично описание."}
                        </div>
                        <div class="product-actions">
                            <a class="btn-secondary view-details" href="product.html?id=${p.id}">Виж детайли</a>
                            <button class="btn-outline remove-btn">Премахни</button>
                            <button class="btn-outline cart-btn">Добави в количката</button>
                        </div>
                    `;

                    const cartBtn = card.querySelector(".cart-btn");
                    const removeBtn = card.querySelector(".remove-btn");

                    if (cartBtn) cartBtn.addEventListener("click", () => addToCart(p.id, safeName, p.price));
                    if (removeBtn) removeBtn.addEventListener("click", () => removeFavorite(p.id));

                    grid.appendChild(card);
                });

                container.appendChild(grid);
            })
            .catch(() => {
                document.getElementById("favorites_list").innerHTML =
                    '<div class="empty-box">Грешка при зареждане на любимите.</div>';
                const countLabel = document.getElementById("favoritesCountLabel");
                if (countLabel) countLabel.textContent = "";
            });
    }
</script>

<script src="js/script.js?v=20260309"></script>
</body>
</html>
