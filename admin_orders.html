<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Админ Поръчки - MusicShop</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-btn-header {
            background: #ffffff;
            color: #222222;
            border: 1px solid #e6e6e6;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .login-btn-header:hover {
            background: #e6e6e6;
            border-color: #d0d0d0;
        }

        body.dark-theme .login-btn-header {
            background: #2a2a2a;
            color: #f5f5f5;
            border-color: #3a3a3a;
        }

        body.dark-theme .login-btn-header:hover {
            background: #333333;
            border-color: #4a4a4a;
        }

        .admin-order-card {
            border: 2px solid rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 1rem 1.1rem;
            background: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.25rem;
        }

        .admin-order-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.12);
            margin: 0.75rem 0;
        }

        .admin-order-controls {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        body.dark-theme .admin-order-card {
            background: #1e1e1e;
            border-color: rgba(255, 255, 255, 0.15);
        }

        body.dark-theme .admin-order-divider {
            background: rgba(255, 255, 255, 0.12);
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            margin-right: 0.6rem;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .brand-icon .brand-logo-dark {
            display: none;
        }

        .nav-links a {
            white-space: nowrap;
        }

        body.dark-theme .brand-icon .brand-logo-light {
            display: none;
        }

        body.dark-theme .brand-icon .brand-logo-dark {
            display: block;
        }

        .admin-orders-page-wrapper {
            width: min(1360px, 100%);
            margin: 0 auto;
        }
    </style>
</head>
<body class="admin-page">

<header class="site-header">
    <div class="nav-inner">
        <a href="index.html" class="brand">
            <div class="brand-icon" aria-hidden="true">
                <img src="images/logo_black.png" alt="" class="brand-logo-light">
                <img src="images/logo_white.png" alt="" class="brand-logo-dark">
            </div>
            <div class="brand-text">
                <h1>MusicShop</h1>
                <p>Инструменти · Плочи · Мърч</p>
            </div>
        </a>

        <nav class="nav-links">
            <a href="products.html">Продукти</a>
            <a href="favorites.html">Любими</a>
            <a href="cart.html">Количка</a>
            <a href="orders.html">Поръчки</a>
            <a href="news.html">Новини</a>
            <a href="admin.html" class="active admin-only" id="adminLink">Админ</a>
        </nav>

        <div class="nav-secondary">
            <button class="theme-toggle" id="themeToggle" aria-label="Смени темата">
                <span id="themeIcon">🌞</span>
            </button>

            <button class="login-btn-header" id="loginBtn" onclick="window.location='login.html'" style="display:none">Вход</button>

            <div class="user-status-pill">
                <div class="user-status-dot"></div>
                <div id="userStatus">Не сте влезли.</div>
            </div>

            <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">
                <span>⏏</span>
                Изход
            </button>
        </div>
    </div>
</header>

<main>
    <div class="admin-orders-page-wrapper">
        <section class="card">
            <div class="admin-card-header">
                <div>
                    <h1>Всички поръчки</h1>
                    <span>Пълен админ преглед на всички направени поръчки</span>
                </div>
                <div class="admin-order-actions">
                    <a class="btn-outline" href="admin.html">Назад</a>
                    <button class="btn-outline" id="exportOrdersBtn" type="button">Експортирай в Excel</button>
                    <button class="btn-secondary" id="deleteAllOrdersBtn" type="button">Изтрий всички поръчки</button>
                </div>
            </div>
            <div id="admin_orders" class="orders-list">Зареждане на поръчки...</div>
        </section>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <span>© <span id="year"></span> MusicShop. Всички права запазени.</span>
        <span id="footerSecondary">Нямаш профил? <a href="register.html">Създай такъв</a></span>
    </div>
</footer>

<script>
    function logout() {
        fetch("/musicshop/api/logout.php", {
            credentials: "include"
        }).then(() => window.location = "index.html");
    }

    document.getElementById("year").textContent = new Date().getFullYear();

    let csrfToken = "";

    function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }

    function renderAdminOrders(container, orders) {
        container.innerHTML = '';

        orders.forEach(order => {
            const items = (order.items || []).map(it =>
                `<li>${escapeHtml(it.name)} - x${Number(it.quantity)} @ €${Number(it.unit_price).toFixed(2)}</li>`
            ).join('');

            const div = document.createElement('div');
            div.className = 'admin-order-card';
            div.innerHTML = `
                <div class="admin-order-header">
                    <strong>Поръчка #${order.id}</strong>
                    <span>${escapeHtml(order.created_at)}</span>
                </div>
                <div class="admin-order-divider"></div>
                <div class="admin-order-meta">
                    <div><strong>Потребител:</strong> ${escapeHtml(order.username || '')} ${order.email ? '(' + escapeHtml(order.email) + ')' : ''}</div>
                    <div><strong>Клиент:</strong> ${escapeHtml(order.customer_name || '-')}${order.customer_email ? ' (' + escapeHtml(order.customer_email) + ')' : ''}${order.customer_phone ? ', ' + escapeHtml(order.customer_phone) : ''}</div>
                    <div><strong>Адрес:</strong> ${escapeHtml(order.shipping_address || '')}, ${escapeHtml(order.shipping_city || '')} ${escapeHtml(order.shipping_postcode || '')}, ${escapeHtml(order.shipping_country || '')}</div>
                    ${order.customer_note ? `<div><strong>Бележка:</strong> ${escapeHtml(order.customer_note)}</div>` : ''}
                    <div><strong>Общо:</strong> €${Number(order.total_price).toFixed(2)}</div>
                </div>
                ${items ? `<div class="admin-order-divider"></div><ul class="admin-order-items">${items}</ul>` : ''}
                <div class="admin-order-controls">
                    <button class="btn-secondary delete-order-btn" data-order-id="${order.id}" type="button">Изтрий поръчката</button>
                </div>
            `;
            container.appendChild(div);

            const delBtn = div.querySelector('.delete-order-btn');
            if (delBtn) {
                delBtn.addEventListener('click', () => deleteOrder(order.id));
            }
        });
    }

    async function deleteOrder(orderId) {
        if (!csrfToken) {
            alert('Липсва CSRF токен. Моля, презареди страницата.');
            return;
        }
        if (!confirm(`Да се изтрие ли поръчка #${orderId}? Това действие е необратимо.`)) return;

        try {
            const resp = await fetch('/musicshop/api/admin_delete_order.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': csrfToken
                },
                credentials: 'include',
                body: JSON.stringify({ id: orderId })
            });
            const data = await resp.json().catch(() => null);
            if (!resp.ok || !data || !data.ok) {
                alert('Изтриването е неуспешно: ' + ((data && data.error) || 'Неизвестна грешка'));
                return;
            }
            loadAllOrders();
        } catch (err) {
            alert('Изтриването е неуспешно.');
        }
    }

    async function deleteAllOrders() {
        if (!csrfToken) {
            alert('Липсва CSRF токен. Моля, презареди страницата.');
            return;
        }
        if (!confirm('Да се изтрият ли ВСИЧКИ поръчки? Това действие е необратимо.')) return;

        try {
            const resp = await fetch('/musicshop/api/admin_delete_all_orders.php', {
                method: 'POST',
                headers: { 'X-CSRF-Token': csrfToken },
                credentials: 'include'
            });
            const data = await resp.json().catch(() => null);
            if (!resp.ok || !data || !data.ok) {
                alert('Изтриването е неуспешно: ' + ((data && data.error) || 'Неизвестна грешка'));
                return;
            }
            loadAllOrders();
        } catch (err) {
            alert('Изтриването е неуспешно.');
        }
    }

    async function exportOrdersCsv() {
        const btn = document.getElementById('exportOrdersBtn');
        if (btn) {
            btn.disabled = true;
            btn.textContent = 'Експортиране...';
        }

        try {
            const resp = await fetch('/musicshop/api/export_orders_csv.php', { credentials: 'include' });
            if (!resp.ok) {
                let message = 'Експортирането е неуспешно.';
                try {
                    const data = await resp.json();
                    if (data && data.error) message = data.error;
                } catch (err) {
                    const text = await resp.text();
                    if (text) message = text;
                }
                alert(message);
                return;
            }

            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toISOString().slice(0, 10);
            a.download = `orders-${date}.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        } catch (err) {
            alert('Експортирането е неуспешно.');
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'Експортирай в Excel';
            }
        }
    }

    async function loadAllOrders() {
        const el = document.getElementById('admin_orders');
        if (!el) return;
        el.textContent = 'Зареждане на поръчки...';

        try {
            const resp = await fetch('/musicshop/api/get_all_orders.php', { credentials: 'include' });
            const text = await resp.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                el.innerHTML = 'Грешка при зареждане на поръчките: <pre>' +
                    text.replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s])) +
                    '</pre>';
                return;
            }

            if (!data.ok) {
                el.textContent = 'Грешка при зареждане на поръчките: ' + (data.error || 'Неизвестна грешка');
                return;
            }

            if (!data.orders || data.orders.length === 0) {
                el.textContent = 'Все още няма поръчки.';
                return;
            }

            renderAdminOrders(el, data.orders);
        } catch (err) {
            console.error(err);
            el.textContent = 'Грешка при зареждане на поръчките.';
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const logoutBtn = document.getElementById("logoutBtn");
        const exportOrdersBtn = document.getElementById("exportOrdersBtn");
        const deleteAllOrdersBtn = document.getElementById("deleteAllOrdersBtn");

        function applyTheme(theme) {
            if (theme === "dark") {
                document.body.classList.add("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌙";
            } else {
                document.body.classList.remove("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌞";
            }
        }

        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme === "dark" ? "dark" : "light");

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                const isDark = document.body.classList.toggle("dark-theme");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                if (themeIcon) themeIcon.textContent = isDark ? "🌙" : "🌞";
            });
        }

        fetch("/musicshop/api/admin_check.php", { credentials: "include" })
            .then(r => {
                if (!r.ok) {
                    window.location = "index.html";
                }
            })
            .catch(() => {
                window.location = "index.html";
            });

        fetch("/musicshop/api/whoami.php", { credentials: "include" })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                const loggedIn = data && data.logged_in;
                if (loggedIn) {
                    csrfToken = data.csrf_token || "";
                    if (logoutBtn) logoutBtn.style.display = "inline-flex";
                    if (loginBtn) loginBtn.style.display = "none";
                    if (footerSecondary) footerSecondary.textContent = "Калоян Милев - Димпломен Проект";
                } else {
                    if (logoutBtn) logoutBtn.style.display = "none";
                    if (loginBtn) loginBtn.style.display = "inline-flex";
                    if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
                }
            })
            .catch(() => {
                if (logoutBtn) logoutBtn.style.display = "none";
                const loginBtn = document.getElementById("loginBtn");
                const footerSecondary = document.getElementById("footerSecondary");
                if (loginBtn) loginBtn.style.display = "inline-flex";
                if (footerSecondary) footerSecondary.innerHTML = 'Нямаш профил? <a href="register.html">Създай такъв</a>';
            });

        if (exportOrdersBtn) {
            exportOrdersBtn.addEventListener('click', exportOrdersCsv);
        }

        if (deleteAllOrdersBtn) {
            deleteAllOrdersBtn.addEventListener('click', deleteAllOrders);
        }

        loadAllOrders();
    });
</script>
</body>
</html>
