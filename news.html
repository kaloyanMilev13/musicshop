<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music News - MusicShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-btn-header {
            background: #ffffff;
            color: #222222;
            border: 1px solid #e6e6e6;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .login-btn-header:hover {
            background: #e6e6e6;
            border-color: #d0d0d0;
        }

        body.dark-theme .login-btn-header {
            background: #2a2a2a;
            color: #f5f5f5;
            border-color: #3a3a3a;
        }

        body.dark-theme .login-btn-header:hover {
            background: #333333;
            border-color: #4a4a4a;
        }
    </style>


</head>
<body class="news-page">

<header class="site-header">
    <div class="nav-inner">
        <a href="index.html" class="brand">
            <div class="brand-icon">
                <span>♫</span>
            </div>
            <div class="brand-text">
                <h1>MusicShop</h1>
                <p>Instruments · Vinyls · Merch</p>
            </div>
        </a>

        <nav class="nav-links">
            <a href="products.html">Products</a>
            <a href="favorites.html">Favorites</a>
            <a href="cart.html">Cart</a>
            <a href="orders.html">Orders</a>
            <a href="news.html" class="active">News</a>
            <a href="admin.html" id="adminLink" class="admin-only">Admin</a>
        </nav>

        <div class="nav-secondary">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <span id="themeIcon">🌞</span>
            </button>

            <button class="login-btn-header" id="loginBtn" onclick="window.location='login.html'" style="display:none">Log In</button>

            <div class="user-status-pill">
                <div class="user-status-dot"></div>
                <div id="userStatus">Not logged in.</div>
            </div>

            <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">
                <span>⏏</span>
                Logout
            </button>
        </div>
    </div>
</header>

<main>
    <div class="page-wrapper">
        <section class="filter-card">
            <div class="filter-header">
                <h1>News</h1>
                <span id="news_count_label">Loading...</span>
            </div>

            <div class="news-filters">
                <label for="news_search">Search</label>
                <input type="text" id="news_search" placeholder="Search by title or text…">
            </div>
        </section>

        <section class="news-section">
            <div class="products-header">
                <h2>Latest stories</h2>
                <span>Fresh updates and announcements</span>
            </div>
            <div id="news_list" class="news-grid">Loading…</div>
        </section>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <span>© <span id="year"></span> MusicShop. All rights reserved.</span>
        <span>Built for your diploma project · <a href="admin.html" id="adminFooterLink" class="admin-only">Admin panel</a></span>
    </div>
</footer>

<script>
    function logout() {
        fetch("/musicshop/api/logout.php", {
            credentials: "include"
        }).then(() => window.location = "index.html");
    }

    document.getElementById("year").textContent = new Date().getFullYear();

    let ALL_NEWS = [];
    let FILTERED_NEWS = [];
    document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const logoutBtn = document.getElementById("logoutBtn");
        const searchInput = document.getElementById("news_search");

        // THEME
        function applyTheme(theme) {
            if (theme === "dark") {
                document.body.classList.add("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌙";
            } else {
                document.body.classList.remove("dark-theme");
                if (themeIcon) themeIcon.textContent = "🌞";
            }
        }

        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme === "dark" ? "dark" : "light");

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                const isDark = document.body.classList.toggle("dark-theme");
                localStorage.setItem("theme", isDark ? "dark" : "light");
                if (themeIcon) themeIcon.textContent = isDark ? "🌙" : "🌞";
            });
        }

        // Admin visibility
        fetch("/musicshop/api/admin_check.php", { credentials: "include" })
            .then(r => {
                if (!r.ok) {
                    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
                } else {
                    document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");
                }
            })
            .catch(() => {
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
            });

        // Login state
        fetch("/musicshop/api/whoami.php", { credentials: "include" })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const loginBtn = document.getElementById("loginBtn");
                const loggedIn = data && data.logged_in;
                if (loggedIn) {
                    if (logoutBtn) logoutBtn.style.display = "inline-flex";
                    if (loginBtn) loginBtn.style.display = "none";
                } else {
                    if (logoutBtn) logoutBtn.style.display = "none";
                    if (loginBtn) loginBtn.style.display = "inline-flex";
                }
            })
            .catch(() => {
                if (logoutBtn) logoutBtn.style.display = "none";
                const loginBtn = document.getElementById("loginBtn");
                if (loginBtn) loginBtn.style.display = "inline-flex";
            });

        // Load news
        loadNews();

        // Client-side search
        if (searchInput) {
            searchInput.addEventListener("input", () => {
                applySearchFilter(searchInput.value.trim());
            });
        }
    });

    // --- NEWS HELPERS ---
    function getNewsImageUrl(news) {
        const raw = (news && typeof news.image_url === "string") ? news.image_url.trim() : "";
        if (!raw) return "images/news/placeholder.jpg";
        if (raw.toLowerCase().startsWith("javascript:")) return "images/news/placeholder.jpg";
        return raw;
    }

    function buildExcerpt(text, max = 140) {
        if (!text) return "";
        const normalized = text.replace(/\s+/g, " ").trim();
        if (normalized.length <= max) return normalized;
        return normalized.slice(0, max - 1) + "…";
    }

    function formatNewsDate(value) {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return value;
        return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function estimateReadTime(text) {
        if (!text) return "";
        const words = text.trim().split(/\s+/).length;
        const minutes = Math.max(1, Math.round(words / 200));
        return `${minutes} min read`;
    }

    function formatNewsMeta(news) {
        if (!news) return "";
        const date = formatNewsDate(news.created_at);
        const readTime = estimateReadTime(news.content || "");
        if (date && readTime) return `${date} • ${readTime}`;
        return date || readTime;
    }

    // --- NEWS LOADING (uses your existing get_news.php) ---
    function loadNews() {
        fetch('/musicshop/api/get_news.php')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('news_list');
                const countLabel = document.getElementById('news_count_label');
                if (!container) return;

                container.innerHTML = '';

                if (!data.ok) {
                    container.textContent = 'Error loading news.';
                    if (countLabel) countLabel.textContent = 'Error';
                    return;
                }

                if (!data.news || data.news.length === 0) {
                    container.textContent = 'No news yet.';
                    if (countLabel) countLabel.textContent = '0 articles';
                    return;
                }

                ALL_NEWS = data.news;
                FILTERED_NEWS = data.news.slice();

                if (countLabel) {
                    countLabel.textContent = FILTERED_NEWS.length + ' article' + (FILTERED_NEWS.length !== 1 ? 's' : '');
                }

                renderNewsList();
            })
            .catch(() => {
                const container = document.getElementById('news_list');
                const countLabel = document.getElementById('news_count_label');
                if (container) container.textContent = 'Error loading news.';
                if (countLabel) countLabel.textContent = 'Error';
            });
    }

    function applySearchFilter(query) {
        const container = document.getElementById('news_list');
        const countLabel = document.getElementById('news_count_label');
        if (!ALL_NEWS.length || !container) return;

        if (!query) {
            FILTERED_NEWS = ALL_NEWS.slice();
        } else {
            const q = query.toLowerCase();
            FILTERED_NEWS = ALL_NEWS.filter(n =>
                (n.title && n.title.toLowerCase().includes(q)) ||
                (n.content && n.content.toLowerCase().includes(q))
            );
        }

        if (countLabel) {
            countLabel.textContent = FILTERED_NEWS.length + ' article' + (FILTERED_NEWS.length !== 1 ? 's' : '');
        }

        container.innerHTML = '';
        if (FILTERED_NEWS.length === 0) {
            container.textContent = 'No news match your search.';
            return;
        }

        renderNewsList();
    }

    function renderNewsList() {
        const container = document.getElementById('news_list');
        if (!container) return;
        container.innerHTML = '';

        FILTERED_NEWS.forEach(n => {
            const card = document.createElement('article');
            card.className = 'news-card';
            card.dataset.id = n.id;
            card.setAttribute('tabindex', '0');

            const img = document.createElement('img');
            img.className = 'news-card-thumb';
            img.src = getNewsImageUrl(n);
            img.alt = n.title ? `${n.title} cover` : 'News thumbnail';

            const body = document.createElement('div');
            body.className = 'news-card-body';

            const title = document.createElement('h3');
            title.className = 'news-card-title';
            title.textContent = n.title || '(No title)';

            const meta = document.createElement('div');
            meta.className = 'news-card-meta';
            meta.textContent = formatNewsMeta(n);

            const excerpt = document.createElement('p');
            excerpt.className = 'news-card-excerpt';
            excerpt.textContent = buildExcerpt(n.content, 140);

            const readMore = document.createElement('a');
            readMore.className = 'news-card-link';
            readMore.href = `news_item.html?id=${encodeURIComponent(n.id)}`;
            readMore.textContent = 'Read full article';
            readMore.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            body.appendChild(title);
            body.appendChild(meta);
            body.appendChild(excerpt);
            body.appendChild(readMore);

            card.appendChild(img);
            card.appendChild(body);

            card.addEventListener('click', () => {
                window.location = `news_item.html?id=${encodeURIComponent(n.id)}`;
            });
            card.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    window.location = `news_item.html?id=${encodeURIComponent(n.id)}`;
                }
            });

            container.appendChild(card);
        });
    }
</script>

<script src="js/script.js"></script>
</body>
</html>
